<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../style/login.css">
    <link rel="stylesheet" href="../style/navbar-footer.css">

</head>

<body>

    <header class="header-pi">
        <div class="header-pi-logo">
            <img src="../imagens/teste-logo-3.png" alt="Computador / Arquivos">
            <p class="header-pi-title">
                <span class="projeto">Projeto</span>
                <span class="fatec">Fatec</span>
            </p>
        </div>

        <div class="header-pi-menu">
            <input type="checkbox" id="menu-toggle" />
            <label for="menu-toggle" class="menu-icon">&#9776;</label>

            <nav class="menu">
                <a href="../index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
                <a href="vagas.html">Vagas</a>
                <a href="depoimentos.html">Depoimentos</a>
            </nav>
        </div>

        <div class="user-menu">
            <input type="checkbox" id="user-toggle">

            <label for="user-toggle" class="user"></label>

            <label for="user-toggle" class="overlay"></label>

            <div class="dropdown">
                <a href="login.html" id="btnLogin">Log In</a>
                <a href="area-logada.html" id="btnPerfil">Perfil</a>
                <!-- <button>Sair</button> -->
                <a href="#" id="btnSair" onclick="logout(event)">Sair</a>
            </div>
        </div>
    </header>

    <main class="main-login">

        <form action="#" class="form-login">
            <legend>Login</legend>

            <div class="usr-login">
                <input type="text" placeholder="Entre com seu email" id="userEmail">
            </div>

            <div class="usr-pwd">
                <input type="password" placeholder="Digite sua senha" id="password">
            </div>

            <div class="btnSNC">
                <button type="button" class="btnLogin" onclick="fazerLogin()">
                    Entrar
                </button>
                <button type="button" class="btnNC" onclick="newuser()">
                    Novo Cadastro
                </button>
            </div>

            <div class="btnES">
                <button type="button" class="btnNewPwd" onclick="forgotpsw()">
                    Esqueci a Senha!
                </button>
                <!-- <a href="nova-senha.html" class="btnNewPwd">Esqueci a Senha!</a> -->
            </div>
        </form>

    </main>

    <footer class="footer-pi">
        <p>2025 - Fatec Franca - DSM - Projeto Interdisciplinar &copy;</p>
    </footer>

    <script src="../js/salvarLocalStorage.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/app.js"></script>

</body>

</html>
