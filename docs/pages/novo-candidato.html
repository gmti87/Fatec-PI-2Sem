<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Candidato</title>
    <link rel="stylesheet" href="../style/navbar-footer.css">
    <link rel="stylesheet" href="../style/novo-candidato.css">
</head>

<body>

    <header class="header-pi">
        <div class="header-pi-logo">
            <img src="../imagens/teste-logo-3.png" alt="Computador / Arquivos">
            <p class="header-pi-title">
                <span class="projeto">Projeto</span>
                <span class="fatec">Fatec</span>
            </p>
        </div>

        <div class="header-pi-menu">
            <input type="checkbox" id="menu-toggle" />
            <label for="menu-toggle" class="menu-icon">&#9776;</label>

            <nav class="menu">
                <a href="../index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
                <a href="vagas.html">Vagas</a>
                <a href="depoimentos.html">Depoimentos</a>
            </nav>
        </div>

        <div class="user-menu">
            <input type="checkbox" id="user-toggle">

            <label for="user-toggle" class="user"></label>

            <label for="user-toggle" class="overlay"></label>

            <div class="dropdown">
                <a href="login.html" id="btnLogin">Log In</a>
                <a href="area-logada.html" id="btnPerfil">Perfil</a>
                <a href="#" id="btnSair">Sair</a>
            </div>
        </div>
    </header>

    <main class="novo-candidato">
        <h1>Cadastrar Candidato</h1>

        <form action="#" class="new-usr">

            <div class="usr-data-1">
                <div class="usr-data">
                    <label for="text">Nome:</label>
                    <input type="text" class="usr-data-i" id="nome">
                </div>

                <div class="usr-data">
                    <label for="text">E-mail:</label>
                    <input type="text" class="usr-data-i" id="email">
                </div>

                <div class="usr-data">
                    <label for="text">Senha:</label>
                    <input type="password" class="usr-pwd" id="senha">
                </div>

                <div class="usr-data">
                    <label for="text">Escolha seu usuário:</label>
                    <select class="usr-select" id="tipo">
                        <option>Estudante</option>
                        <option>Recrutador</option>
                        <option>Especialista</option>
                    </select>
                </div>

                <!-- Curso do Escolhido pelo Aluno -->
                <!-- <legend>Cadastrar Curso </legend> -->

                <div class="usr-data">
                    <label for="text">Curso</label>
                    <select name="" class="usr-curso" id="curso-usr">
                        <option value="ADS">Análise e Desenvolvimento de Sistemas</option>
                        <option value="DSM">Desenvolvimento de Software Multiplataforma</option>
                        <option value="GPI">Gestão da Produção Industrial</option>
                        <option value="GRH">Gestão de Recursos Humanos</option>
                        <option value="GE">Gestão Empresarial</option>
                    </select>
                </div>

                <div class="usr-data">
                    <label for="text">Instituição</label>
                    <input type="text" id="inst-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Semestre</label>
                    <select class="usr-sem" id="sem-usr">
                        <option value="1">1º Semestre</option>
                        <option value="2">2º Semestre</option>
                        <option value="3">3º Semestre</option>
                        <option value="4">4º Semestre</option>
                        <option value="5">5º Semestre</option>
                        <option value="6">6º Semestre</option>
                    </select>
                </div>

                <div class="usr-data">
                    <label for="text">Turno</label>
                    <select class="usr-turno" id="turno-usr">
                        <option value="manha">Manhã</option>
                        <option value="noite">Noite</option>
                    </select>
                </div>

                <div class="usr-data">
                    <label for="text">Data Inicio:</label>
                    <input type="date" class="usr-dt-inicio" id="dt-inicio">
                </div>

                <div class="usr-data">
                    <label for="text">Data Término:</label>
                    <input type="date" class="usr-dt-termino" id="dt-term">
                </div>

                <!-- <legend>Cadastrar Endereço</legend> -->
                <!-- Endereço fornecido pelo Aluno -->
                <div class="usr-data">
                    <label for="text">CEP:</label>
                    <input type="text" class="usr-cep" id="cep-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Logradouro:</label>
                    <input type="text" class="usr-rua" id="rua-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Complemento:</label>
                    <input type="text" class="usr-comp" id="comp-end-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Numero:</label>
                    <input type="text" class="usr-num" id="num-comp-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Bairro:</label>
                    <input type="text" class="usr-bairro" id="bairro-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Cidade:</label>
                    <input type="text" class="usr-cidade" id="cidade-usr">
                </div>

                <div class="usr-data">
                    <label for="text">Estado:</label>
                    <!-- <input type="text" class="usr-estado" id="estado-usr"> -->
                    <select name="" class="usr-estado" id="estado-usr">
                        <option value="AC">AC - Acre</option>
                        <option value="AL">AL - Alagoas</option>
                        <option value="AP">AP - Amapá</option>
                        <option value="AM">AM - Amazonas</option>
                        <option value="BA">BA - Bahia</option>
                        <option value="CE">CE - Ceará</option>
                        <option value="ES">ES - Espírito Santo</option>
                        <option value="GO">GO - Goiás</option>
                        <option value="MA">MA - Maranhão</option>
                        <option value="MT">MT - Mato Grosso</option>
                        <option value="MT">MT - Mato Grosso do Sul</option>
                        <option value="MG">MG - Minas Gerais</option>
                        <option value="PA">PA - Pará</option>
                        <option value="PB">PB - Paraíba</option>
                        <option value="PR">PR - Paraná</option>
                        <option value="PE">PE - Pernambuco</option>
                        <option value="PI">PI - Piauí</option>
                        <option value="RJ">RJ - Rio de Janeiro</option>
                        <option value="RN">RN - Rio Grande do Norte</option>
                        <option value="RS">RS - Rio Grande do Sul</option>
                        <option value="RO">RO - Rondônia</option>
                        <option value="RR">RR - Roraima</option>
                        <option value="SC">SC - Santa Catarina</option>
                        <option value="SP" selected>SP - São Paulo</option>
                        <option value="SE">SE - Sergipe</option>
                        <option value="TO">TO - Tocantins</option>
                    </select>
                </div>

            </div>

            <div class="usr-btns">
                <button type="button" class="btn-salvar" onclick="saveUser(event)">Salvar</button>
                <button type="button" class="btn-cancelar" onclick="cancelNewuser()">Cancelar</button>
            </div>
        </form>

    </main>

    <footer class="footer-pi">
        <p>2025 - Fatec Franca - DSM - Projeto Interdisciplinar &copy;</p>
    </footer>

    <!-- <script src="../js/salvarLocalStorage.js"></script> -->
    <script src="../js/login.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/saveUser.js"></script>
    <script src="../js/cancel-newUser.js"></script>


</body>

</html>
